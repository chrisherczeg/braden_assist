<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#CFB991" />
    <title>Purdue Run</title>
    <link rel="stylesheet" href="/run/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <h1>Purdue Run</h1>
        <p>Run across campus past Purdue landmarks — swipe/arrows to dodge, up to jump</p>
      </header>

      <section class="game-card">
        <canvas id="gameCanvas" aria-label="Purdue Run endless runner"></canvas>
        <div class="hud">
          <div class="score-pill">Best <span id="distance">0</span></div>
          <button id="charButton" type="button">Girl</button>
          <button id="topScoresButton" type="button">Top 3</button>
          <button id="restartButton" type="button">Restart</button>
        </div>
      </section>
    </main>

    <script src="/run/game.js"></script>
  </body>
</html>
