<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#1e90ff" />
    <title>Flappy Bird Browser Edition</title>
    <link rel="stylesheet" href="/flappy/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <h1>Flappy Bird</h1>
        <p>Tap, click, or press space to flap</p>
      </header>

      <section class="game-card">
        <canvas id="gameCanvas" aria-label="Flappy Bird game"></canvas>
        <div class="hud">
          <div class="score-pill">Score <span id="score">0</span></div>
          <button id="restartButton" type="button">Restart</button>
        </div>
      </section>
    </main>

    <script src="/flappy/game.js"></script>
  </body>
</html>
