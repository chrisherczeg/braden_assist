<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Braden Smith — Career Assist Tracker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto:wght@300;400;700&display=swap');

    :root {
      --gold: #CFB991;
      --black: #101010;
      --dark: #1a1a1a;
      --gray: #2a2a2a;
      --white: #FFFFFF;
      --gold-dim: #a89768;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Roboto', sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: linear-gradient(180deg, var(--dark) 0%, var(--black) 100%);
      border-bottom: 4px solid var(--gold);
      padding: 1.5rem 2rem;
      text-align: center;
    }

    header h1 {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 1.6rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--gold);
    }

    header h1 span {
      color: var(--white);
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      width: 100%;
      max-width: 600px;
    }

    .card {
      background: var(--dark);
      border: 2px solid var(--gold);
      border-radius: 12px;
      padding: 2.5rem 3rem;
      text-align: center;
      width: 100%;
      box-shadow: 0 0 40px rgba(207, 185, 145, 0.08);
    }

    .player-name {
      font-family: 'Oswald', sans-serif;
      font-size: 2.4rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.15rem;
    }

    .player-info {
      font-size: 0.95rem;
      color: var(--gold-dim);
      margin-bottom: 2rem;
      letter-spacing: 0.05em;
    }

    .stat-label {
      font-family: 'Oswald', sans-serif;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-family: 'Oswald', sans-serif;
      font-size: 6rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 0.25rem;
      transition: opacity 0.3s;
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 0.15em;
    }

    .stat-value .divider {
      font-size: 3rem;
      color: #555;
      font-weight: 400;
    }

    .stat-value .record {
      font-size: 2.8rem;
      color: #888;
      font-weight: 400;
    }

    .stat-value.loading {
      opacity: 0.3;
    }

    .breakdown {
      font-size: 0.85rem;
      color: #888;
      margin-top: 0.75rem;
    }

    .breakdown span {
      color: #bbb;
    }

    .status-bar {
      margin-top: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: #666;
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf50;
      animation: pulse-anim 2s infinite;
    }

    .pulse.error {
      background: #f44336;
      animation: none;
    }

    @keyframes pulse-anim {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .progress-bar {
      width: 100%;
      height: 3px;
      background: var(--gray);
      border-radius: 2px;
      margin-top: 1rem;
      overflow: hidden;
    }

    .progress-bar .fill {
      height: 100%;
      background: var(--gold);
      border-radius: 2px;
      width: 0%;
      transition: width 1s linear;
    }

    .error-msg {
      color: #f44336;
      font-size: 0.85rem;
      margin-top: 1rem;
      display: none;
    }

    footer {
      padding: 1.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.05em;
    }

    footer a {
      color: var(--gold-dim);
      text-decoration: none;
    }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem; }
      .player-name { font-size: 1.8rem; }
      .stat-value { font-size: 4.5rem; }
      .stat-value .divider { font-size: 2rem; }
      .stat-value .record { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Purdue <span>Boilermakers</span> Basketball</h1>
  </header>

  <div class="container">
    <div class="card">
      <div class="player-name">Braden Smith</div>
      <div class="player-info">#3 &middot; Guard &middot; Purdue</div>

      <div class="stat-label">Career Assists</div>
      <div class="stat-value loading" id="assist-count">
        <span id="assist-num">&mdash;</span>
        <span class="divider">/</span>
        <span class="record">1,076</span>
      </div>

      <div class="breakdown" id="breakdown"></div>

      <div class="status-bar">
        <div class="pulse" id="pulse"></div>
        <span id="status-text">Connecting&hellip;</span>
      </div>

      <div class="progress-bar">
        <div class="fill" id="progress-fill"></div>
      </div>

      <div class="error-msg" id="error-msg"></div>
    </div>
  </div>

  <footer>
    Data via <a href="https://www.espn.com" target="_blank" rel="noopener">ESPN</a> &middot; Refreshes every 45 s
  </footer>

  <script>
    const PLAYER_ID = "5105854";
    const BASE = "https://site.api.espn.com/apis/common/v3/sports/basketball/mens-college-basketball/athletes";
    const REFRESH_MS = 45_000;

    const elCount = document.getElementById("assist-count");
    const elBreakdown = document.getElementById("breakdown");
    const elPulse = document.getElementById("pulse");
    const elStatus = document.getElementById("status-text");
    const elProgress = document.getElementById("progress-fill");
    const elError = document.getElementById("error-msg");

    async function espnGet(url) {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`ESPN returned ${resp.status}`);
      return resp.json();
    }

    async function getCareerAssists() {
      // 1) Per-season totals from /stats
      const stats = await espnGet(`${BASE}/${PLAYER_ID}/stats`);
      let priorAst = 0;
      let currentSeasonName = "";

      for (const cat of (stats.categories || [])) {
        if (!(cat.displayName || "").includes("Total")) continue;
        const labels = cat.labels || [];
        const astIdx = labels.indexOf("AST");
        if (astIdx === -1) continue;

        const seasons = cat.statistics || [];
        if (seasons.length) {
          currentSeasonName = (seasons[seasons.length - 1].season || {}).displayName || "";
        }
        // Sum all prior seasons (everything except the last)
        for (const entry of seasons.slice(0, -1)) {
          const val = parseInt(entry.stats?.[astIdx], 10);
          if (!isNaN(val)) priorAst += val;
        }
        break;
      }

      // 2) Current season assists from gamelog (real-time)
      const gamelog = await espnGet(`${BASE}/${PLAYER_ID}/gamelog`);
      const glLabels = gamelog.labels || [];
      const glAstIdx = glLabels.indexOf("AST");

      let currentAst = 0;
      if (glAstIdx !== -1) {
        for (const st of (gamelog.seasonTypes || [])) {
          for (const cat of (st.categories || [])) {
            for (const event of (cat.events || [])) {
              const row = event.stats || [];
              if (glAstIdx < row.length) {
                const val = parseInt(row[glAstIdx], 10);
                if (!isNaN(val)) currentAst += val;
              }
            }
          }
        }
      }

      return { total: priorAst + currentAst, priorAst, currentAst, currentSeasonName };
    }

    async function refresh() {
      try {
        elCount.classList.add("loading");
        const { total, priorAst, currentAst, currentSeasonName } = await getCareerAssists();

        document.getElementById("assist-num").textContent = total.toLocaleString();
        elCount.classList.remove("loading");

        const parts = [];
        if (priorAst) parts.push(`<span>${priorAst}</span> prior seasons`);
        if (currentAst || currentSeasonName) parts.push(`<span>${currentAst}</span> ${currentSeasonName || "current season"}`);
        elBreakdown.innerHTML = parts.join(" + ");

        elPulse.classList.remove("error");
        elStatus.textContent = `Updated ${new Date().toLocaleTimeString()}`;
        elError.style.display = "none";
      } catch (err) {
        elPulse.classList.add("error");
        elStatus.textContent = "Update failed";
        elError.textContent = err.message;
        elError.style.display = "block";
        elCount.classList.remove("loading");
      }
    }

    // Progress bar animation
    let progressInterval;
    function startProgress() {
      elProgress.style.transition = "none";
      elProgress.style.width = "0%";
      // Force reflow
      void elProgress.offsetWidth;
      elProgress.style.transition = `width ${REFRESH_MS}ms linear`;
      elProgress.style.width = "100%";
    }

    async function tick() {
      await refresh();
      startProgress();
    }

    // Initial fetch + recurring timer
    tick();
    setInterval(tick, REFRESH_MS);
  </script>

</body>
</html>
